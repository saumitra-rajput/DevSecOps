# This workflow will check the Code quality of Application
# Linting and SAST scan
# lint - flake8 & SAST - Bandit

name: code-quality

on: 
  push:
    branches: [ main ]
  # workflow_call:
    
jobs:
  valdiate: 
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: 
        python-version: [ "3.11", "3.12", "3.13" ]
    steps:
      - name: checkout Code
        uses: actions/checkout@v4

      - name: Install python
        uses: actions/setup-python@v5
        with: 
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint check
        run: flake8 app.py
      
      - name: SAST - static analysis security testing 
        run: bandit -r app.py