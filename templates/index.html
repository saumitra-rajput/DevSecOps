<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevSecOps Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            max-width: 600px;
            margin: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin: 10px;
        }

        .success {
            background: #4CAF50;
            color: white;
        }

        .info {
            background: #2196F3;
            color: white;
        }

        .message {
            color: #ddd;
            font-size: 1.2rem;
            margin: 30px 0;
            line-height: 1.6;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .status-item {
            color: #fff;
            margin: 15px 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status-item span {
            color: #4CAF50;
            font-weight: bold;
        }

        .footer {
            color: #888;
            margin-top: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 My DevSecOps Project</h1>
        
        <div>
            <span class="badge success">✓ Security Checks Passed</span>
            <span class="badge info">⚡ GitHub Actions CI/CD</span>
        </div>

        <div class="message">
            Successfully deployed on server<br>
            <small>All security scans completed</small>
        </div>

        <div class="status-box">
            <div class="status-item">
                <span>✓</span> SAST Scan: Passed
            </div>
            <div class="status-item">
                <span>✓</span> Dependency Check: Passed
            </div>
            <div class="status-item">
                <span>✓</span> Container Security: Passed
            </div>
            <div class="status-item">
                <span>✓</span> Deployed via GitHub Actions
            </div>
        </div>

        <div class="footer">
            Last deployed: <span id="datetime"></span>
        </div>
    </div>

    <script>
        document.getElementById('datetime').innerHTML = new Date().toLocaleString();
    </script>
</body>
</html>
